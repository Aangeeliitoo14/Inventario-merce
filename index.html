<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merce Pro - Control de Stock</title>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDqJlFee1MVBjKEHZZyBKHZ6u69F1P4U0s",
        authDomain: "inventario-merce.firebaseapp.com",
        projectId: "inventario-merce",
        storageBucket: "inventario-merce.firebasestorage.app",
        messagingSenderId: "656395871608",
        appId: "1:656395871608:web:36320543205b1c58601c8d"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const invCol = collection(db, "productos");
      let listaLocal = [];

      onSnapshot(invCol, (snap) => {
        listaLocal = snap.docs.map(d => ({ ...d.data(), id: d.id }));
        // Orden alfabético automático
        listaLocal.sort((a, b) => a.nombre.localeCompare(b.nombre));
        dibujarTabla(listaLocal);
      });

      window.crearProducto = async () => {
        const nom = document.getElementById('n').value;
        const cant = parseInt(document.getElementById('c').value) || 0;
        if(nom) {
            await addDoc(invCol, { nombre: nom, almacen: cant, tienda: 0, collblanc: 0 });
            document.getElementById('n').value = ''; document.getElementById('c').value = '';
        }
      };

      window.ajustarStock = async (id, actual, operacion, campo) => {
        const prefix = campo === 'almacen' ? 'alm' : (campo === 'tienda' ? 'tda' : 'col');
        const input = document.getElementById(`in-${prefix}-${id}`);
        const valor = parseInt(input.value) || 0;
        if (valor <= 0) return;

        const producto = listaLocal.find(p => p.id === id);
        const almActual = producto.almacen || 0;
        const updateData = {};

        if (operacion === 'sumar') {
            if (campo === 'tienda' || campo === 'collblanc') {
                if (almActual < valor) { alert("¡No hay suficiente en Almacén!"); return; }
                updateData['almacen'] = almActual - valor;
            }
            updateData[campo] = actual + valor;
        } else {
            let nuevoTotal = actual - valor;
            updateData[campo] = nuevoTotal < 0 ? 0 : nuevoTotal;
        }
        await updateDoc(doc(db, "productos", id), updateData);
        input.value = '';
      };

      window.resetearDia = async () => {
        if(confirm("¿Poner Tienda y Collblanc a 0?")) {
            const promesas = listaLocal.map(p => updateDoc(doc(db, "productos", p.id), { tienda: 0, collblanc: 0 }));
            await Promise.all(promesas);
        }
      };

      window.dibujarTabla = (productos) => {
        document.getElementById('tabla').innerHTML = productos.map(p => `
            <tr>
                <td style="text-align:left"><b>${p.nombre}</b></td>
                <td class="bg-stock">
                    <span class="badge">${p.almacen || 0}</span><br>
                    <input type="number" id="in-alm-${p.id}" class="small-input" placeholder="0">
                    <button class="b-g" onclick="ajustarStock('${p.id}', ${p.almacen || 0}, 'sumar', 'almacen')">+</button>
                </td>
                <td class="bg-tienda">
                    <span class="badge blue">${p.tienda || 0}</span><br>
                    <input type="number" id="in-tda-${p.id}" class="small-input" placeholder="0">
                    <div style="display:flex; gap:2px; justify-content:center;">
                        <button class="b-g" onclick="ajustarStock('${p.id}', ${p.tienda || 0}, 'sumar', 'tienda')">+</button>
                        <button class="b-r" onclick="ajustarStock('${p.id}', ${p.tienda || 0}, 'restar', 'tienda')">-</button>
                    </div>
                </td>
                <td class="bg-coll">
                    <span class="badge purple">${p.collblanc || 0}</span><br>
                    <input type="number" id="in-col-${p.id}" class="small-input" placeholder="0">
                    <button class="b-g" onclick="ajustarStock('${p.id}', ${p.collblanc || 0}, 'sumar', 'collblanc')">+</button>
                </td>
            </tr>`).join('');
      };

      window.filtrar = () => {
        const busqueda = document.getElementById('lupa').value.toLowerCase();
        dibujarTabla(listaLocal.filter(p => p.nombre.toLowerCase().includes(busqueda)));
      };
    </script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; font-size: 11px; }
        .box { background: white; padding: 15px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px 2px; border-bottom: 1px solid #eee; text-align: center; }
        .small-input { width: 35px; padding: 4px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 2px; }
        button { border: none; border-radius: 4px; padding: 5px; color: white; font-weight: bold; }
        .b-g { background: #28a745; } .b-r { background: #dc3545; } .b-b { background: #007bff; }
        .badge { background: #333; color: white; padding: 2px 6px; border-radius: 8px; font-size: 13px; display: inline-block; }
        .badge.blue { background: #007bff; } .badge.purple { background: #6f42c1; }
        .search-container { margin: 10px 0; }
        .lupa-input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        h3 { margin-top: 0; text-align: center; color: #333; }
    </style>
</head>
<body>
    <div class="box">
        <h3>📦 Merce Pro Cloud</h3>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="n" placeholder="Producto..." style="flex: 2; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
            <input type="number" id="c" placeholder="Cant" style="width: 50px; border-radius: 4px; border: 1px solid #ccc;">
            <button class="b-b" onclick="crearProducto()">Add</button>
        </div>
        <div class="search-container">
            <input type="text" id="lupa" class="lupa-input" placeholder="🔍 Buscar..." onkeyup="filtrar()">
        </div>
        <table>
            <thead>
                <tr style="font-size: 9px; color: #777;">
                    <th>PRODUCTO</th><th>ALM.</th><th>TDA.</th><th>COLL.</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
        <button class="b-r" style="width:100%; margin-top:20px; padding:12px; font-size: 14px;" onclick="resetearDia()">
            🔄 REINICIAR TIENDAS (A 0)
        </button>
    </div>
</body>
</html>
